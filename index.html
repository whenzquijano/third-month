<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Our Chronicles — 3D Flipbook</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Lato:wght@300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    /* Jungle Theme Colors */
    --canopy-dark: #06140b;
    --jungle-deep: #0f2e18;
    --leaf-green: #255431;
    --moss: #4a6b46;
    --sunlight: #e6c875;
    
    /* Antique Book Colors */
    --leather: #2b1f1a;
    --gold: #d4af37;
    --gold-muted: #8c6d2c;
    --parchment: #f4ecd8;
    --parchment-dark: #e0d4b6;
    --ink: #2c1e16;
    --ink-soft: #4a3324;
    --wax-red: #7a1010;
    --wax-dark: #4a0404;

    /* Responsive Two-Sided Book Size */
    --page-w: min(45vw, 420px);
    --page-h: max(480px, min(65vw, 600px));
  }

  body {
    background-color: var(--canopy-dark);
    font-family: 'Lato', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 2rem 1rem 4rem;
    overflow-x: hidden;
    color: var(--parchment);
  }

  /* Lush Rainforest Background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: 
      radial-gradient(circle at 20% -10%, rgba(230, 200, 117, 0.15) 0%, transparent 40%),
      radial-gradient(circle at 80% 110%, rgba(37, 84, 49, 0.4) 0%, transparent 50%),
      linear-gradient(170deg, var(--jungle-deep) 0%, var(--canopy-dark) 100%);
    pointer-events: none;
    z-index: 0;
  }

  /* Ambient Fireflies */
  .firefly {
    position: fixed;
    border-radius: 50%;
    background: var(--sunlight);
    box-shadow: 0 0 8px 2px rgba(230, 200, 117, 0.6);
    pointer-events: none;
    z-index: 0;
    opacity: 0;
    animation: drift 12s infinite ease-in-out;
  }

  @keyframes drift {
    0% { transform: translateY(0) scale(0.8); opacity: 0; }
    20% { opacity: 0.8; }
    80% { opacity: 0.8; }
    100% { transform: translateY(-150px) translateX(30px) scale(1.2); opacity: 0; }
  }

  /* ── HEADER ── */
  .header {
    text-align: center;
    margin-bottom: 2.5rem;
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .header .eyebrow {
    font-family: 'Cinzel', serif;
    font-size: 11px;
    letter-spacing: 0.4em;
    text-transform: uppercase;
    color: var(--sunlight);
    margin-bottom: 0.5rem;
  }

  .header h1 {
    font-family: 'Cinzel', serif;
    font-size: clamp(2rem, 5vw, 3rem);
    font-weight: 600;
    color: var(--parchment);
    line-height: 1.1;
  }

  .divider {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 1rem auto 0;
    width: 250px;
  }

  .divider::before, .divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold-muted), transparent);
  }

  .divider-leaf { color: var(--moss); transform: rotate(45deg); font-size: 16px; }

  /* ── 3D BOOK STAGE ── */
  .stage {
    position: relative;
    z-index: 1;
    display: flex;
    justify-content: center;
    width: 100%;
    margin-bottom: 2rem;
  }

  .book-container {
    position: relative;
    perspective: 2500px;
    width: calc(var(--page-w) * 2);
    height: var(--page-h);
    transition: transform 0.9s cubic-bezier(0.25, 1, 0.5, 1);
    transform-style: preserve-3d;
  }

  /* Centering Logic based on state */
  .book-container.closed-front {
    transform: translateX(calc(var(--page-w) / 2 * -1)) scale(0.95);
  }
  
  .book-container.opened {
    transform: translateX(0) scale(1);
  }

  .book-container.closed-back {
    transform: translateX(calc(var(--page-w) / 2)) scale(0.95);
  }

  .book {
    position: absolute;
    inset: 0;
    transform-style: preserve-3d;
  }

  /* ── LEAVES & PAGES ── */
  .leaf {
    position: absolute;
    right: 0; /* Align all leaves to the right half initially */
    width: var(--page-w);
    height: 100%;
    transform-origin: left center;
    transform-style: preserve-3d;
    transition: transform 1s cubic-bezier(0.645, 0.045, 0.355, 1);
  }

  .leaf.flipped {
    transform: rotateY(-180deg);
  }

  .page {
    position: absolute;
    inset: 0;
    backface-visibility: hidden;
    background: var(--parchment);
    background-image: url('data:image/svg+xml;utf8,<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"><filter id="n"><feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="3" stitchTiles="stitch"/></filter><rect width="100%" height="100%" filter="url(%23n)" opacity="0.05"/></svg>');
    border: 1px solid #d3c4a3;
  }

  .page.front {
    transform: rotateY(0deg);
    border-radius: 0 8px 8px 0;
    box-shadow: inset 15px 0 20px -10px rgba(0,0,0,0.15), 5px 5px 15px rgba(0,0,0,0.3);
  }

  .page.back {
    transform: rotateY(180deg);
    border-radius: 8px 0 0 8px;
    box-shadow: inset -15px 0 20px -10px rgba(0,0,0,0.15), -5px 5px 15px rgba(0,0,0,0.3);
  }

  /* Spine depth illusion */
  .book::after {
    content: '';
    position: absolute;
    left: 50%;
    top: 0;
    bottom: 0;
    width: 20px;
    transform: translateX(-50%);
    background: linear-gradient(to right, rgba(0,0,0,0.4), transparent 20%, transparent 80%, rgba(0,0,0,0.4));
    z-index: -1;
    border-radius: 50%;
    box-shadow: 0 10px 20px rgba(0,0,0,0.5);
  }

  /* ── COVER STYLES (Front & Fin) ── */
  .page.cover-page {
    background: var(--leather);
    background-image: url('data:image/svg+xml;utf8,<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"><filter id="n"><feTurbulence type="fractalNoise" baseFrequency="1.5" numOctaves="4"/></filter><rect width="100%" height="100%" filter="url(%23n)" opacity="0.12"/></svg>');
    border: none;
    box-shadow: inset 0 0 50px rgba(0,0,0,0.8), 8px 8px 30px rgba(0,0,0,0.7);
  }

  .cover-content {
    position: absolute;
    inset: 15px;
    border: 2px solid var(--gold-muted);
    border-radius: 4px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    text-align: center;
  }

  .cover-content::before {
    content: '';
    position: absolute;
    inset: 8px;
    border: 1px solid rgba(140, 109, 44, 0.4);
  }

  .cover-title {
    font-family: 'Cinzel', serif;
    font-size: 26px;
    font-weight: 700;
    color: var(--gold);
    line-height: 1.4;
    letter-spacing: 0.1em;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.9);
  }

  .cover-title em {
    display: block;
    font-style: italic;
    font-family: 'Playfair Display', serif;
    font-weight: 400;
    font-size: 1.3em;
    color: var(--sunlight);
    margin-top: 0.5rem;
  }

  .cover-names {
    font-size: 11px;
    letter-spacing: 0.4em;
    text-transform: uppercase;
    color: var(--gold-muted);
    font-family: 'Cinzel', serif;
    margin-top: 2rem;
  }

  .cover-rule {
    width: 60px;
    height: 1px;
    background: var(--gold-muted);
    margin: 1rem auto;
  }

  .cover-tagline {
    font-size: 13px;
    color: rgba(255,255,255,0.7);
    font-style: italic;
    font-family: 'Playfair Display', serif;
    margin-top: 1.5rem;
  }

  /* ── INNER PAGE: MESSAGE (Right Side) ── */
  .message-content {
    padding: 3.5rem 3rem;
    height: 100%;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }

  .msg-label {
    font-family: 'Cinzel', serif;
    font-size: 10px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--moss);
    margin-bottom: 1rem;
    font-weight: 600;
  }

  .msg-heading {
    font-family: 'Playfair Display', serif;
    font-size: 1.8rem;
    color: var(--ink);
    line-height: 1.2;
    font-style: italic;
  }

  .msg-rule {
    width: 40px;
    height: 2px;
    background: var(--gold-muted);
    margin: 1.5rem 0;
  }

  .msg-body {
    font-size: 14.5px;
    line-height: 1.8;
    color: var(--ink-soft);
    margin-bottom: 2rem;
  }

  .msg-signature {
    font-family: 'Playfair Display', serif;
    font-size: 16px;
    color: var(--ink);
    font-style: italic;
    font-weight: 600;
  }

  /* ── INNER PAGE: MEDIA (Left Side) ── */
  .photo-frame {
    position: absolute;
    inset: 40px 40px 120px;
    border-radius: 4px;
    background: rgba(139, 115, 85, 0.1);
    border: 1px solid rgba(139, 115, 85, 0.3);
    padding: 8px;
    box-shadow: inset 0 2px 8px rgba(0,0,0,0.05);
  }

  .photo-frame img, .photo-frame video {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    border-radius: 2px;
    filter: sepia(0.2) contrast(1.05);
  }

  .photo-placeholder {
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    background: rgba(139, 115, 85, 0.05);
    cursor: pointer;
    border: 1px dashed rgba(139, 115, 85, 0.4);
    transition: background 0.2s;
  }

  .photo-placeholder:hover { background: rgba(139, 115, 85, 0.15); }
  .photo-placeholder svg { opacity: 0.6; color: var(--ink-soft); }
  .photo-placeholder span {
    font-size: 11px; color: var(--ink-soft); letter-spacing: 0.1em; font-family: 'Cinzel', serif;
  }
  .photo-placeholder input[type="file"] { display: none; }

  .caption-strip {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 110px;
    padding: 20px 40px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 6px;
    border-top: 1px solid rgba(139, 115, 85, 0.2);
  }

  .caption-date {
    font-family: 'Cinzel', serif;
    font-size: 10px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--moss);
    font-weight: 600;
  }

  .caption-title {
    font-family: 'Playfair Display', serif;
    font-size: 19px;
    color: var(--ink);
    font-style: italic;
  }

  .page-num {
    position: absolute;
    bottom: 20px;
    font-size: 10px;
    letter-spacing: 0.15em;
    color: var(--ink-soft);
    font-family: 'Cinzel', serif;
  }
  .page.front .page-num { right: 25px; }
  .page.back .page-num { left: 25px; }

  /* ── WAX SEAL ── */
  .wax-seal {
    position: absolute;
    top: 50%;
    right: -30px;
    transform: translateY(-50%);
    width: 70px;
    height: 70px;
    background: radial-gradient(circle at 35% 35%, #a51c1c, var(--wax-red) 50%, var(--wax-dark));
    border-radius: 50%;
    z-index: 1000;
    box-shadow: 0 6px 12px rgba(0,0,0,0.6), inset 0 0 10px rgba(0,0,0,0.8);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: var(--sunlight);
    border: 2px solid #5a0606;
    cursor: pointer;
    transition: opacity 0.5s, transform 0.5s;
  }

  .wax-seal::after {
    content: '';
    position: absolute;
    inset: -3px;
    border-radius: 50%;
    border: 3px dashed var(--wax-dark);
    opacity: 0.5;
  }

  .wax-seal svg {
    width: 28px;
    height: 28px;
    fill: var(--sunlight);
    filter: drop-shadow(1px 1px 1px rgba(0,0,0,0.5));
  }

  .wax-seal .click-text {
    position: absolute;
    top: 85px;
    white-space: nowrap;
    background: rgba(15, 46, 24, 0.9);
    border: 1px solid var(--gold-muted);
    color: var(--sunlight);
    padding: 6px 14px;
    border-radius: 4px;
    font-family: 'Cinzel', serif;
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    animation: bounce 2s infinite;
  }

  @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(6px); } }

  .seal-broken {
    opacity: 0 !important;
    pointer-events: none !important;
    transform: translateY(-50%) scale(0) !important;
  }

  /* ── NAVIGATION ── */
  .nav {
    display: flex;
    align-items: center;
    gap: 2rem;
    position: relative;
    z-index: 1;
    opacity: 0;
    transform: translateY(20px);
    transition: all 0.8s;
  }
  .nav.visible { opacity: 1; transform: translateY(0); }

  .nav-btn {
    width: 50px;
    height: 50px;
    border-radius: 50%;
    border: 1px solid var(--gold-muted);
    background: rgba(15, 46, 24, 0.8);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.3s;
    color: var(--sunlight);
  }
  .nav-btn:hover:not(:disabled) { background: var(--gold-muted); color: var(--canopy-dark); transform: scale(1.1); }
  .nav-btn:disabled { opacity: 0.3; cursor: default; }
  .nav-btn svg { width: 22px; height: 22px; stroke: currentColor; fill: none; stroke-width: 2; }
  
  .page-counter { font-family: 'Cinzel', serif; font-size: 14px; letter-spacing: 0.15em; color: var(--parchment); }

  @media (max-width: 768px) {
    :root { --page-w: 48vw; }
    .message-content { padding: 2rem 1.5rem; }
    .photo-frame { inset: 20px 20px 90px; }
    .caption-strip { padding: 15px 20px; height: 90px; }
    .msg-heading { font-size: 1.4rem; }
    .msg-body { font-size: 13px; margin-bottom: 1rem; }
  }
</style>
</head>
<body>

<div id="fireflies-container"></div>

<header class="header">
  <p class="eyebrow">A monthsary for two</p>
  <h1>Our <em>Adventure</em></h1>
  <div class="divider"><span class="divider-leaf">✤</span></div>
</header>

<div class="stage">
  <div class="book-container closed-front" id="bookContainer">
    <div class="book" id="book">
      <div class="wax-seal" id="waxSeal">
        <svg viewBox="0 0 24 24"><path d="M12 2L14.5 9.5L22 12L14.5 14.5L12 22L9.5 14.5L2 12L9.5 9.5L12 2Z"/></svg>
        <span class="click-text">Break Seal</span>
      </div>
    </div>
  </div>
</div>

<nav class="nav" id="navControls">
  <button class="nav-btn" id="prevBtn" disabled>
    <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
  </button>
  <span class="page-counter" id="counter"></span>
  <button class="nav-btn" id="nextBtn">
    <svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
  </button>
</nav>

<script>
// Ambient Fireflies
const ffContainer = document.getElementById('fireflies-container');
for(let i=0; i<15; i++) {
  let ff = document.createElement('div');
  ff.className = 'firefly';
  ff.style.left = Math.random() * 100 + 'vw';
  ff.style.top = Math.random() * 100 + 'vh';
  ff.style.width = Math.random() * 4 + 2 + 'px';
  ff.style.height = ff.style.width;
  ff.style.animationDelay = Math.random() * 10 + 's';
  ff.style.animationDuration = Math.random() * 10 + 10 + 's';
  ffContainer.appendChild(ff);
}

// Data Array (12 Chapters)
const CONTENT = [
  {
    caption: { date: 'Month 1', title: 'Uncharted Territory' },
    message: {
      heading: 'I knew from day one.',
      body: 'The first time we talked, something clicked inside me that I couldn\'t quite explain. I just knew you were someone special — a mystery I wanted to explore completely, slowly, and for a long time.',
      sig: 'Still smiling thinking about it ✤'
    }
  },
  {
    caption: { date: 'Month 2', title: 'Mapping the Details' },
    message: {
      heading: 'Every detail I love.',
      body: 'Learning your little habits — how you laugh, what you order, the way you say my name — each one felt like a tiny treasure. I was quietly collecting all of them, saving them like pressed leaves in a book.',
      sig: 'My favorite collection ✤'
    }
  },
  {
    caption: { date: 'Month 3', title: 'Our First Escapades' },
    message: {
      heading: 'Anywhere with you.',
      body: 'It doesn\'t matter where we go — deep in the jungle or just walking down a familiar street. Every place becomes wild and wonderful the moment we\'re together. You make the ordinary feel magical.',
      sig: 'Take me everywhere ✤'
    }
  },
  {
    caption: { date: 'Month 4', title: 'Echoes of Laughter' },
    message: {
      heading: 'You make me laugh like no one else.',
      body: 'There are jokes only we understand, laughs so loud they echo through the trees, and moments so absurd only we find them funny. That private world we\'ve built together — I treasure it deeply.',
      sig: 'Our own little comedy ✤'
    }
  },
  {
    caption: { date: 'Month 5', title: 'Quiet in the Canopy' },
    message: {
      heading: 'Silence feels safe with you.',
      body: 'Not every beautiful moment is loud. Some of my favorites are the quiet ones — sitting close, listening to the world breathe, feeling completely at peace because you\'re right there.',
      sig: 'This is shelter ✤'
    }
  },
  {
    caption: { date: 'Month 6', title: 'Halfway Across' },
    message: {
      heading: 'Six months of us.',
      body: 'Half a year of sunrises and sunsets, easy trails and steep climbs, inside jokes and genuine tears. Every single day has been worth it because you\'re my compass. Here\'s to the next six.',
      sig: 'Halfway, and going further ✤'
    }
  },
  {
    caption: { date: 'Month 7', title: 'Sudden Discoveries' },
    message: {
      heading: 'You still catch me off guard.',
      body: 'Just when I think I have the map memorized, you do something that takes my breath away. A kindness I didn\'t expect, a word that hits exactly right. You keep reminding me why I choose you.',
      sig: 'Always surprised, always yours ✤'
    }
  },
  {
    caption: { date: 'Month 8', title: 'Roots Growing Deeper' },
    message: {
      heading: 'Better because of you.',
      body: 'Being loved by you makes me want to be a stronger version of myself. Not because I have to, but because I see how beautifully you navigate life, and I want to walk right beside you.',
      sig: 'Growing, side by side ✤'
    }
  },
  {
    caption: { date: 'Month 9', title: 'Weathering the Storms' },
    message: {
      heading: 'You stayed.',
      body: 'Love isn\'t just the sunny days — it\'s also the heavy rains, when you held my hand through the storm and didn\'t seek shelter alone. That\'s the unwavering loyalty I want to return to you.',
      sig: 'Always staying ✤'
    }
  },
  {
    caption: { date: 'Month 10', title: 'Charting the Future' },
    message: {
      heading: 'I want it all with you.',
      body: 'I catch myself imagining what the horizon looks like — and every version of it has you there. Not because I force the picture, but because every wild dream I have somehow has you at the center.',
      sig: 'Can\'t wait ✤'
    }
  },
  {
    caption: { date: 'Month 11', title: 'The Little Treasures' },
    message: {
      heading: 'It\'s the small things.',
      body: 'Good morning signals. Making sure I have what I need. Checking if I navigated home safe. These little things add up to a massive feeling of being loved. You love me in the details.',
      sig: 'Noticing everything ✤'
    }
  },
  {
    mediaType: 'video', // FINAL SLIDE IS VIDEO
    caption: { date: 'Month 13', title: 'To the Horizon' },
    message: {
      heading: 'Thank you for being my co-explorer.',
      body: 'Every page of this ancient journal is a memory I\'m grateful for. But the best part? We\'ve barely scratched the surface. There are so many blank pages ahead — and I want to fill every single one with you.',
      sig: 'Yours, now and always ✤'
    }
  }
];

const book = document.getElementById('book');
const numLeaves = CONTENT.length + 1; // 12 Content chapters + Cover = 13 leaves
const leafEls = [];

// Build the 3D Flipbook Structure
for (let i = 0; i < numLeaves; i++) {
  const leaf = document.createElement('div');
  leaf.className = 'leaf';
  leaf.id = `leaf-${i}`;

  // ── FRONT OF LEAF (Right Side of Spread) ──
  const front = document.createElement('div');
  front.className = 'page front';
  
  if (i === 0) {
    front.classList.add('cover-page');
    front.innerHTML = `
      <div class="cover-content">
        <h2 class="cover-title">OUR<br><em>Chronicles</em></h2>
        <div class="cover-rule"></div>
        <p class="cover-names">You & Me</p>
        <p class="cover-tagline">"To the greatest adventure of my life."</p>
      </div>`;
    
    // Attach the wax seal directly to the cover leaf so it moves with it
    const seal = document.getElementById('waxSeal');
    if(seal) front.appendChild(seal);

  } else {
    // The front of leaf `i` shows the text for chapter `i-1`
    const p = CONTENT[i - 1];
    front.innerHTML = `
      <div class="message-content">
        <p class="msg-label">Explorer's Note</p>
        <h2 class="msg-heading">${p.message.heading}</h2>
        <div class="msg-rule"></div>
        <p class="msg-body">${p.message.body}</p>
        <p class="msg-signature">${p.message.sig}</p>
        <span class="page-num">Pg ${i * 2}</span>
      </div>`;
  }

  // ── BACK OF LEAF (Left Side of Spread) ──
  const back = document.createElement('div');
  back.className = 'page back';
  
  if (i === numLeaves - 1) {
    // The back of the final leaf is the back cover
    back.classList.add('cover-page');
    back.innerHTML = `
      <div class="cover-content">
        <h2 class="cover-title"><br><em>Fin</em></h2>
        <div class="cover-rule"></div>
        <p class="cover-tagline">"The adventure continues."</p>
      </div>`;
  } else {
    // The back of leaf `i` shows the media for chapter `i`
    const p = CONTENT[i];
    const isVideo = p.mediaType === 'video';
    
    back.innerHTML = `
      <span class="page-num">Pg ${i * 2 + 1}</span>
      <div class="photo-frame" id="frame-${i}">
        <label class="photo-placeholder" for="upload-${i}">
          <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">
            ${isVideo ? '<polygon points="5 3 19 12 5 21 5 3"/>' : '<rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/>'}
          </svg>
          <span>${isVideo ? 'Pin Video Attachment' : 'Pin Photograph'}</span>
          <input type="file" id="upload-${i}" accept="${isVideo ? 'video/*' : 'image/*'}">
        </label>
      </div>
      <div class="caption-strip">
        <span class="caption-date">${p.caption.date}</span>
        <span class="caption-title">${p.caption.title}</span>
      </div>`;

    // File upload logic
    setTimeout(() => {
      const input = back.querySelector(`#upload-${i}`);
      input.addEventListener('change', e => {
        const file = e.target.files[0];
        if (!file) return;
        const url = URL.createObjectURL(file);
        const frame = document.getElementById(`frame-${i}`);
        if (isVideo) {
          frame.innerHTML = `<video src="${url}" controls autoplay loop muted></video>`;
        } else {
          frame.innerHTML = `<img src="${url}" alt="Memory ${i}">`;
        }
      });
    }, 0);
  }

  leaf.appendChild(front);
  leaf.appendChild(back);
  book.appendChild(leaf);
  leafEls.push(leaf);
}

// Flipbook Logic
let currentSpread = 0;
const totalSpreads = numLeaves; 
const bookContainer = document.getElementById('bookContainer');
const prevBtn = document.getElementById('prevBtn');
const nextBtn = document.getElementById('nextBtn');
const counter = document.getElementById('counter');
const navControls = document.getElementById('navControls');
const waxSeal = document.getElementById('waxSeal');

function updateZIndex() {
  for (let i = 0; i < numLeaves; i++) {
    if (i < currentSpread) {
      // Flipped to the left, higher index = higher z-index (closer to top)
      leafEls[i].style.zIndex = i;
    } else {
      // Resting on the right, lower index = higher z-index (closer to top)
      leafEls[i].style.zIndex = numLeaves - i;
    }
  }
}

function goToSpread(spreadIndex) {
  if (spreadIndex < 0 || spreadIndex > totalSpreads) return;

  // Flip the leaves
  for (let i = 0; i < numLeaves; i++) {
    if (i < spreadIndex) {
      leafEls[i].classList.add('flipped');
    } else {
      leafEls[i].classList.remove('flipped');
    }
  }

  currentSpread = spreadIndex;
  updateZIndex();

  // Shift container center of gravity based on state
  if (currentSpread === 0) {
    bookContainer.className = 'book-container closed-front';
  } else if (currentSpread === totalSpreads) {
    bookContainer.className = 'book-container closed-back';
  } else {
    bookContainer.className = 'book-container opened';
  }

  // Update UI Nav
  if (currentSpread > 0) {
    navControls.classList.add('visible');
    waxSeal.classList.add('seal-broken'); // Hide seal once opened
  }
  
  counter.textContent = currentSpread === 0 ? "Cover" : (currentSpread === totalSpreads ? "Fin" : `${currentSpread} / ${totalSpreads - 1}`);
  prevBtn.disabled = currentSpread === 0;
  nextBtn.disabled = currentSpread === totalSpreads;
}

// Event Listeners
waxSeal.addEventListener('click', () => {
  goToSpread(1); // Break seal and open to first page
});

prevBtn.addEventListener('click', () => goToSpread(currentSpread - 1));
nextBtn.addEventListener('click', () => goToSpread(currentSpread + 1));

document.addEventListener('keydown', e => {
  if (currentSpread === 0) return; // Don't allow arrows until seal broken
  if (e.key === 'ArrowRight' && currentSpread < totalSpreads) goToSpread(currentSpread + 1);
  if (e.key === 'ArrowLeft' && currentSpread > 0) goToSpread(currentSpread - 1);
});

// Init
updateZIndex();
counter.textContent = "Cover";
</script>
</body>
