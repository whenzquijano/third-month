<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3rd Month Date — 3D Flipbook</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Lato:wght@300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    /* Jungle Theme Colors */
    --canopy-dark: #06140b;
    --jungle-deep: #0f2e18;
    --leaf-green: #255431;
    --moss: #4a6b46;
    --sunlight: #e6c875;
    
    /* Antique Book Colors */
    --leather: #2b1f1a;
    --gold: #d4af37;
    --gold-muted: #8c6d2c;
    --parchment: #f4ecd8;
    --parchment-dark: #e0d4b6;
    --ink: #2c1e16;
    --ink-soft: #4a3324;
    --wax-red: #7a1010;
    --wax-dark: #4a0404;

    /* Desktop Book Size */
    --page-w: min(45vw, 420px);
    --page-h: max(480px, min(65vw, 600px));
  }

  body {
    background-color: var(--canopy-dark);
    font-family: 'Lato', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 2rem 1rem 4rem;
    overflow-x: hidden;
    color: var(--parchment);
  }

  /* Lush Rainforest Background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: 
      radial-gradient(circle at 20% -10%, rgba(230, 200, 117, 0.15) 0%, transparent 40%),
      radial-gradient(circle at 80% 110%, rgba(37, 84, 49, 0.4) 0%, transparent 50%),
      linear-gradient(170deg, var(--jungle-deep) 0%, var(--canopy-dark) 100%);
    pointer-events: none;
    z-index: 0;
  }

  /* Ambient Fireflies */
  .firefly {
    position: fixed;
    border-radius: 50%;
    background: var(--sunlight);
    box-shadow: 0 0 8px 2px rgba(230, 200, 117, 0.6);
    pointer-events: none;
    z-index: 0;
    opacity: 0;
    animation: drift 12s infinite ease-in-out;
  }

  @keyframes drift {
    0% { transform: translateY(0) scale(0.8); opacity: 0; }
    20% { opacity: 0.8; }
    80% { opacity: 0.8; }
    100% { transform: translateY(-150px) translateX(30px) scale(1.2); opacity: 0; }
  }

  /* ── HEADER ── */
  .header {
    text-align: center;
    margin-bottom: 2.5rem;
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .header .eyebrow {
    font-family: 'Cinzel', serif;
    font-size: 11px;
    letter-spacing: 0.4em;
    text-transform: uppercase;
    color: var(--sunlight);
    margin-bottom: 0.5rem;
  }

  .header h1 {
    font-family: 'Cinzel', serif;
    font-size: clamp(2rem, 5vw, 3rem);
    font-weight: 600;
    color: var(--parchment);
    line-height: 1.1;
  }

  .divider {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 1rem auto 0;
    width: 250px;
  }

  .divider::before, .divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold-muted), transparent);
  }

  .divider-leaf { color: var(--moss); transform: rotate(45deg); font-size: 16px; }

  /* ── 3D BOOK STAGE ── */
  .stage {
    position: relative;
    z-index: 1;
    display: flex;
    justify-content: center;
    width: 100%;
    margin-bottom: 2rem;
  }

  .book-container {
    position: relative;
    perspective: 2500px;
    width: calc(var(--page-w) * 2);
    height: var(--page-h);
    transition: transform 0.9s cubic-bezier(0.25, 1, 0.5, 1);
    transform-style: preserve-3d;
  }

  .book-container.closed-front {
    transform: translateX(calc(var(--page-w) / 2 * -1)) scale(0.95);
  }
  
  .book-container.opened {
    transform: translateX(0) scale(1);
  }

  .book-container.closed-back {
    transform: translateX(calc(var(--page-w) / 2)) scale(0.95);
  }

  .book {
    position: absolute;
    inset: 0;
    transform-style: preserve-3d;
  }

  /* ── LEAVES & PAGES ── */
  .leaf {
    position: absolute;
    right: 0;
    width: var(--page-w);
    height: 100%;
    transform-origin: left center;
    transform-style: preserve-3d;
    transition: transform 1s cubic-bezier(0.645, 0.045, 0.355, 1);
  }

  .leaf.flipped {
    transform: rotateY(-180deg);
  }

  .page {
    position: absolute;
    inset: 0;
    backface-visibility: hidden;
    background: var(--parchment);
    background-image: url('data:image/svg+xml;utf8,<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"><filter id="n"><feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="3" stitchTiles="stitch"/></filter><rect width="100%" height="100%" filter="url(%23n)" opacity="0.05"/></svg>');
    border: 1px solid #d3c4a3;
  }

  .page.front {
    transform: rotateY(0deg);
    border-radius: 0 8px 8px 0;
    box-shadow: inset 15px 0 20px -10px rgba(0,0,0,0.15), 5px 5px 15px rgba(0,0,0,0.3);
  }

  .page.back {
    transform: rotateY(180deg);
    border-radius: 8px 0 0 8px;
    box-shadow: inset -15px 0 20px -10px rgba(0,0,0,0.15), -5px 5px 15px rgba(0,0,0,0.3);
  }

  /* Spine depth illusion */
  .book::after {
    content: '';
    position: absolute;
    left: 50%;
    top: 0;
    bottom: 0;
    width: 20px;
    transform: translateX(-50%);
    background: linear-gradient(to right, rgba(0,0,0,0.4), transparent 20%, transparent 80%, rgba(0,0,0,0.4));
    z-index: -1;
    border-radius: 50%;
    box-shadow: 0 10px 20px rgba(0,0,0,0.5);
  }

  /* ── COVER STYLES (Front & Fin) ── */
  .page.cover-page {
    background: var(--leather);
    background-image: url('data:image/svg+xml;utf8,<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"><filter id="n"><feTurbulence type="fractalNoise" baseFrequency="1.5" numOctaves="4"/></filter><rect width="100%" height="100%" filter="url(%23n)" opacity="0.12"/></svg>');
    border: none;
    box-shadow: inset 0 0 50px rgba(0,0,0,0.8), 8px 8px 30px rgba(0,0,0,0.7);
  }

  .cover-content {
    position: absolute;
    inset: 15px;
    border: 2px solid var(--gold-muted);
    border-radius: 4px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    text-align: center;
  }

  .cover-content::before {
    content: '';
    position: absolute;
    inset: 8px;
    border: 1px solid rgba(140, 109, 44, 0.4);
  }

  .cover-title {
    font-family: 'Cinzel', serif;
    font-size: 26px;
    font-weight: 700;
    color: var(--gold);
    line-height: 1.4;
    letter-spacing: 0.1em;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.9);
  }

  .cover-title em {
    display: block;
    font-style: italic;
    font-family: 'Playfair Display', serif;
    font-weight: 400;
    font-size: 1.3em;
    color: var(--sunlight);
    margin-top: 0.5rem;
  }

  .cover-names {
    font-size: 11px;
    letter-spacing: 0.4em;
    text-transform: uppercase;
    color: var(--gold-muted);
    font-family: 'Cinzel', serif;
    margin-top: 2rem;
  }

  .cover-rule {
    width: 60px;
    height: 1px;
    background: var(--gold-muted);
    margin: 1rem auto;
  }

  .cover-tagline {
    font-size: 13px;
    color: rgba(255,255,255,0.7);
    font-style: italic;
    font-family: 'Playfair Display', serif;
    margin-top: 1.5rem;
  }

  /* ── INNER PAGE: MESSAGE (Right Side) ── */
  .message-content {
    padding: 3.5rem 3rem;
    height: 100%;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }

  .msg-label {
    font-family: 'Cinzel', serif;
    font-size: 10px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--moss);
    margin-bottom: 1rem;
    font-weight: 600;
  }

  .msg-heading {
    font-family: 'Playfair Display', serif;
    font-size: 1.8rem;
    color: var(--ink);
    line-height: 1.2;
    font-style: italic;
  }

  .msg-rule {
    width: 40px;
    height: 2px;
    background: var(--gold-muted);
    margin: 1.5rem 0;
  }

  .msg-body {
    font-size: 14.5px;
    line-height: 1.8;
    color: var(--ink-soft);
    margin-bottom: 2rem;
  }

  .msg-signature {
    font-family: 'Playfair Display', serif;
    font-size: 16px;
    color: var(--ink);
    font-style: italic;
    font-weight: 600;
  }

  /* ── INNER PAGE: MEDIA (Left Side) ── */
  .photo-frame {
    position: absolute;
    inset: 40px 40px 120px;
    border-radius: 4px;
    background: rgba(139, 115, 85, 0.1);
    border: 1px solid rgba(139, 115, 85, 0.3);
    padding: 8px;
    box-shadow: inset 0 2px 8px rgba(0,0,0,0.05);
  }

  .photo-frame img, .photo-frame video {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    border-radius: 2px;
    filter: sepia(0.2) contrast(1.05);
  }

  .caption-strip {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 110px;
    padding: 20px 40px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 6px;
    border-top: 1px solid rgba(139, 115, 85, 0.2);
  }

  .caption-date {
    font-family: 'Cinzel', serif;
    font-size: 10px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--moss);
    font-weight: 600;
  }

  .caption-title {
    font-family: 'Playfair Display', serif;
    font-size: 19px;
    color: var(--ink);
    font-style: italic;
  }

  .page-num {
    position: absolute;
    bottom: 20px;
    font-size: 10px;
    letter-spacing: 0.15em;
    color: var(--ink-soft);
    font-family: 'Cinzel', serif;
  }
  .page.front .page-num { right: 25px; }
  .page.back .page-num { left: 25px; }

  /* ── WAX SEAL & TWINE ── */
  .twine {
    position: absolute;
    top: 50%;
    left: -10px;
    right: -20px;
    height: 8px;
    background: repeating-linear-gradient(
      45deg,
      #5c4033,
      #5c4033 2px,
      #3e2723 2px,
      #3e2723 4px
    );
    transform: translateY(-50%);
    z-index: 900;
    box-shadow: 0 4px 6px rgba(0,0,0,0.5);
    transition: opacity 0.5s, transform 0.5s;
    pointer-events: none;
  }

  .wax-seal {
    position: absolute;
    top: 50%;
    right: -30px;
    transform: translateY(-50%);
    width: 70px;
    height: 70px;
    background: radial-gradient(circle at 35% 35%, #a51c1c, var(--wax-red) 50%, var(--wax-dark));
    border-radius: 50%;
    z-index: 1000;
    box-shadow: 0 6px 12px rgba(0,0,0,0.6), inset 0 0 10px rgba(0,0,0,0.8);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: var(--sunlight);
    border: 2px solid #5a0606;
    cursor: pointer;
    transition: opacity 0.5s, transform 0.5s;
  }

  .wax-seal::after {
    content: '';
    position: absolute;
    inset: -3px;
    border-radius: 50%;
    border: 3px dashed var(--wax-dark);
    opacity: 0.5;
  }

  .wax-seal svg {
    width: 28px;
    height: 28px;
    fill: var(--sunlight);
    filter: drop-shadow(1px 1px 1px rgba(0,0,0,0.5));
  }

  .wax-seal .click-text {
    position: absolute;
    top: 85px;
    white-space: nowrap;
    background: rgba(15, 46, 24, 0.9);
    border: 1px solid var(--gold-muted);
    color: var(--sunlight);
    padding: 6px 14px;
    border-radius: 4px;
    font-family: 'Cinzel', serif;
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    animation: bounce 2s infinite;
  }

  @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(6px); } }

  .seal-broken {
    opacity: 0 !important;
    pointer-events: none !important;
    transform: translateY(-50%) scale(0) !important;
  }

  /* ── NAVIGATION ── */
  .nav {
    display: flex;
    align-items: center;
    gap: 2rem;
    position: relative;
    z-index: 1;
    opacity: 0;
    transform: translateY(20px);
    transition: all 0.8s;
  }
  .nav.visible { opacity: 1; transform: translateY(0); }

  .nav-btn {
    width: 50px;
    height: 50px;
    border-radius: 50%;
    border: 1px solid var(--gold-muted);
    background: rgba(15, 46, 24, 0.8);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.3s;
    color: var(--sunlight);
  }
  .nav-btn:hover:not(:disabled) { background: var(--gold-muted); color: var(--canopy-dark); transform: scale(1.1); }
  .nav-btn:disabled { opacity: 0.3; cursor: default; }
  .nav-btn svg { width: 22px; height: 22px; stroke: currentColor; fill: none; stroke-width: 2; }
  
  .page-counter { font-family: 'Cinzel', serif; font-size: 14px; letter-spacing: 0.15em; color: var(--parchment); }

  /* ── POCKET DIARY MOBILE OPTIMIZATION (Vertical Phones) ── */
  @media (max-width: 768px) {
    :root { 
      --page-w: 46vw; /* Takes up 92% of the mobile screen */
      --page-h: calc(var(--page-w) * 1.75); /* Locks it to a realistic book proportion! */
    }
    
    .header { margin-bottom: 1.5rem; }
    .header h1 { font-size: 1.6rem; }
    .header .eyebrow { font-size: 9px; letter-spacing: 0.25em; }
    .divider { width: 150px; margin-top: 0.5rem; }

    /* Book Centering on Mobile */
    .book-container.closed-front { transform: translateX(calc(var(--page-w) / 2 * -1)) scale(1); }
    .book-container.opened { transform: translateX(0) scale(1); }
    .book-container.closed-back { transform: translateX(calc(var(--page-w) / 2)) scale(1); }
    
    /* Cover Adjustments */
    .cover-content { padding: 1rem; inset: 10px; }
    .cover-title { font-size: 1.25rem; }
    .cover-title em { font-size: 1.15em; margin-top: 0.5rem; }
    .cover-names { font-size: 9px; margin-top: 1.5rem; }
    .cover-rule { width: 40px; margin: 0.5rem auto; }
    .cover-tagline { font-size: 11px; margin-top: 1rem; line-height: 1.4; padding: 0 10px; }

    /* Message Side Adjustments (Right side) */
    .message-content { 
      padding: 1.25rem 1rem; 
      justify-content: flex-start; /* Pushes text to the top */
      overflow-y: auto; /* Allows scrolling if text is long */
    }
    
    /* Hides the scrollbar for a cleaner look, but keeps it scrollable */
    .message-content::-webkit-scrollbar { display: none; }
    .message-content { -ms-overflow-style: none; scrollbar-width: none; }

    .msg-label { font-size: 8px; margin-bottom: 0.4rem; letter-spacing: 0.15em; margin-top: 0.5rem; }
    .msg-heading { font-size: 1.05rem; line-height: 1.2; }
    .msg-rule { margin: 0.6rem 0; width: 30px; height: 1.5px; }
    .msg-body { font-size: 10.5px; line-height: 1.5; margin-bottom: 1rem; }
    .msg-signature { font-size: 11px; margin-bottom: 1.5rem; } /* Extra margin for scrolling */

    /* Media Side Adjustments (Left side) */
    .photo-frame { inset: 15px 15px 75px; padding: 4px; }
    .caption-strip { height: 65px; padding: 10px 15px; gap: 4px; }
    .caption-title { font-size: 11.5px; }
    .caption-date { font-size: 8px; }

    /* Details */
    .page-num { bottom: 12px; font-size: 8px; }
    .page.front .page-num { right: 15px; }
    .page.back .page-num { left: 15px; }

    /* Wax Seal Scaled Down */
    .wax-seal { width: 50px; height: 50px; right: -25px; }
    .wax-seal svg { width: 20px; height: 20px; }
    .wax-seal .click-text { top: 60px; font-size: 9px; padding: 4px 10px; }

    /* Navigation Mobile */
    .nav { gap: 1.5rem; margin-top: 1rem; }
    .nav-btn { width: 42px; height: 42px; }
    .nav-btn svg { width: 18px; height: 18px; }
    .page-counter { font-size: 11px; }
  }

  /* ── LANDSCAPE PHONE OPTIMIZATION ── */
  @media (max-height: 500px) and (orientation: landscape) {
    :root { 
      --page-w: 35vw; 
      --page-h: 85vh; 
    }
    body { padding-top: 1rem; justify-content: center; }
    .header { display: none; /* Hide header so book takes full screen */ }
    .nav { position: absolute; bottom: 5vh; gap: 4rem; }
  }
</style>
</head>
<body>

<div id="fireflies-container"></div>

<header class="header">
  <p class="eyebrow">To my beloved</p>
  <h1>Third <em>Monthsary</em></h1>
  <div class="divider"><span class="divider-leaf">✤</span></div>
</header>

<div class="stage">
  <div class="book-container closed-front" id="bookContainer">
    <div class="book" id="book">
      <div class="twine" id="twine"></div>
      <div class="wax-seal" id="waxSeal">
        <svg viewBox="0 0 24 24"><path d="M12 2L14.5 9.5L22 12L14.5 14.5L12 22L9.5 14.5L2 12L9.5 9.5L12 2Z"/></svg>
        <span class="click-text">Break Seal</span>
      </div>
    </div>
  </div>
</div>

<nav class="nav" id="navControls">
  <button class="nav-btn" id="prevBtn" disabled>
    <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
  </button>
  <span class="page-counter" id="counter"></span>
  <button class="nav-btn" id="nextBtn">
    <svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
  </button>
</nav>

<script>
// Ambient Fireflies
const ffContainer = document.getElementById('fireflies-container');
for(let i=0; i<15; i++) {
  let ff = document.createElement('div');
  ff.className = 'firefly';
  ff.style.left = Math.random() * 100 + 'vw';
  ff.style.top = Math.random() * 100 + 'vh';
  ff.style.width = Math.random() * 4 + 2 + 'px';
  ff.style.height = ff.style.width;
  ff.style.animationDelay = Math.random() * 10 + 's';
  ff.style.animationDuration = Math.random() * 10 + 10 + 's';
  ffContainer.appendChild(ff);
}

const book = document.getElementById('book');
const numLeaves = CONTENT.length + 1; // 12 Content chapters + Cover = 13 leaves
const leafEls = [];

// Build the 3D Flipbook Structure
for (let i = 0; i < numLeaves; i++) {
  const leaf = document.createElement('div');
  leaf.className = 'leaf';
  leaf.id = `leaf-${i}`;

  // ── FRONT OF LEAF (Right Side of Spread) ──
  const front = document.createElement('div');
  front.className = 'page front';
  
  if (i === 0) {
    front.classList.add('cover-page');
    front.innerHTML = `
      <div class="cover-content">
        <h2 class="cover-title">THIRD MONTH<br><em>Date</em></h2>
        <div class="cover-rule"></div>
        <p class="cover-names">You? & Me</p>
        <p class="cover-tagline">"To the lonliest date of my life."</p>
      </div>`;
    
    // Attach twine and seal to the moving cover
    const twine = document.getElementById('twine');
    if(twine) front.appendChild(twine);
    const seal = document.getElementById('waxSeal');
    if(seal) front.appendChild(seal);

  } else {
    const p = CONTENT[i - 1];
    front.innerHTML = `
      <div class="message-content">
        <p class="msg-label">Date Note</p>
        <h2 class="msg-heading">${p.message.heading}</h2>
        <div class="msg-rule"></div>
        <p class="msg-body">${p.message.body}</p>
        <p class="msg-signature">${p.message.sig}</p>
        <span class="page-num">Pg ${i * 2}</span>
      </div>`;
  }

  // ── BACK OF LEAF (Left Side of Spread) ──
  const back = document.createElement('div');
  back.className = 'page back';
  
  if (i === numLeaves - 1) {
    back.classList.add('cover-page');
    back.innerHTML = `
      <div class="cover-content">
        <h2 class="cover-title"><br><em>Fin</em></h2>
        <div class="cover-rule"></div>
        <p class="cover-tagline">"I hope the next date isn't as lonely as this."</p>
      </div>`;
  } else {
    const p = CONTENT[i];
    const isVideo = p.mediaType === 'video';
    
    // Renders the image/video straight from the file path
    back.innerHTML = `
      <span class="page-num">Pg ${i * 2 + 1}</span>
      <div class="photo-frame">
        ${isVideo ? 
          `<video src="${p.media}" controls playsinline></video>` : 
          `<img src="${p.media}" alt="${p.caption.title}">`
        }
      </div>
      <div class="caption-strip">
        <span class="caption-date">${p.caption.date}</span>
        <span class="caption-title">${p.caption.title}</span>
      </div>`;
  }

  leaf.appendChild(front);
  leaf.appendChild(back);
  book.appendChild(leaf);
  leafEls.push(leaf);
}

// Flipbook Logic
let currentSpread = 0;
const totalSpreads = numLeaves; 
const bookContainer = document.getElementById('bookContainer');
const prevBtn = document.getElementById('prevBtn');
const nextBtn = document.getElementById('nextBtn');
const counter = document.getElementById('counter');
const navControls = document.getElementById('navControls');
const waxSeal = document.getElementById('waxSeal');

function updateZIndex() {
  for (let i = 0; i < numLeaves; i++) {
    if (i < currentSpread) {
      leafEls[i].style.zIndex = i;
    } else {
      leafEls[i].style.zIndex = numLeaves - i;
    }
  }
}

function goToSpread(spreadIndex) {
  if (spreadIndex < 0 || spreadIndex > totalSpreads) return;

  // Pause any playing videos when turning the page
  document.querySelectorAll('video').forEach(vid => vid.pause());

  for (let i = 0; i < numLeaves; i++) {
    if (i < spreadIndex) {
      leafEls[i].classList.add('flipped');
    } else {
      leafEls[i].classList.remove('flipped');
    }
  }

  currentSpread = spreadIndex;
  updateZIndex();

  if (currentSpread === 0) {
    bookContainer.className = 'book-container closed-front';
  } else if (currentSpread === totalSpreads) {
    bookContainer.className = 'book-container closed-back';
  } else {
    bookContainer.className = 'book-container opened';
  }

  if (currentSpread > 0) {
    navControls.classList.add('visible');
    waxSeal.classList.add('seal-broken'); 
    
    // Also break the twine when opened
    const twineEl = document.getElementById('twine');
    if(twineEl) twineEl.classList.add('seal-broken');
  }
  
  counter.textContent = currentSpread === 0 ? "Cover" : (currentSpread === totalSpreads ? "Fin" : `${currentSpread} / ${totalSpreads - 1}`);
  prevBtn.disabled = currentSpread === 0;
  nextBtn.disabled = currentSpread === totalSpreads;
}

waxSeal.addEventListener('click', () => {
  goToSpread(1); 
});

prevBtn.addEventListener('click', () => goToSpread(currentSpread - 1));
nextBtn.addEventListener('click', () => goToSpread(currentSpread + 1));

document.addEventListener('keydown', e => {
  if (currentSpread === 0) return; 
  if (e.key === 'ArrowRight' && currentSpread < totalSpreads) goToSpread(currentSpread + 1);
  if (e.key === 'ArrowLeft' && currentSpread > 0) goToSpread(currentSpread - 1);
});

updateZIndex();
counter.textContent = "Cover";
</script>
